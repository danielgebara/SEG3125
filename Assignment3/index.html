<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip — Memory Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>

  <!-- SETUP SCREEN -->
  <div id="setupScreen">
    <header>
      <h1>Flip</h1>
      <p>A card matching memory game</p>
    </header>

    <section>
      <h2>Difficulty</h2>
      <div class="option-group" id="difficultyGroup">
        <button class="option-btn active" data-value="easy">Easy — 4x3</button>
        <button class="option-btn" data-value="medium">Medium — 4x4</button>
        <button class="option-btn" data-value="hard">Hard — 6x4</button>
      </div>
    </section>

    <section>
      <h2>Theme</h2>
      <div class="option-group" id="themeGroup">
        <button class="option-btn active" data-value="animals">Animals</button>
        <button class="option-btn" data-value="food">Food</button>
        <button class="option-btn" data-value="nature">Nature</button>
        <button class="option-btn" data-value="sports">Sports</button>
      </div>
    </section>

    <button class="btn-main" id="startBtn">Start Game</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="hidden">
    <header>
      <h1>Flip</h1>
      <div class="game-stats">
        <span>Moves: <strong id="moveCount">0</strong></span>
        <span>Pairs: <strong id="pairCount">0</strong> / <strong id="pairTotal">0</strong></span>
        <span>Time: <strong id="timer">0s</strong></span>
      </div>
      <div class="game-btns">
        <button class="btn-small" id="restartBtn">Restart</button>
        <button class="btn-small" id="menuBtn">Menu</button>
      </div>
    </header>

    <div id="board"></div>
  </div>

  <!-- WIN SCREEN -->
  <div id="winScreen" class="hidden">
    <header>
      <h1>Flip</h1>
    </header>
    <section style="text-align:center">
      <h2 style="color:#ccc; font-size:1rem; margin-bottom:8px;">You won!</h2>
      <p id="winStats"></p>
      <div class="btn-row" style="justify-content:center; margin-top:24px;">
        <button class="btn-main" id="playAgainBtn">Play Again</button>
        <button class="btn-small" id="menuBtn2">Menu</button>
      </div>
    </section>
  </div>

  <footer>
    <p>Designed by Daniel Gebara · SEG3125 · University of Ottawa · 2026</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
